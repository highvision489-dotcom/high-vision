<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Maier - Goosy Gang">
    <title>AETHERIUS 3D | Admin Sandbox</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>

    <style>
        :root {
            --admin-blue: #00a2ff;
            --admin-dark: #1b1d1f;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #000; }
        
        /* UI OVERLAY */
        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; /* Allows clicking through to the game */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* ADMIN PANEL */
        #admin-panel {
            position: absolute;
            top: 20px; right: 20px;
            width: 300px;
            background: var(--admin-dark);
            border: 2px solid var(--admin-blue);
            border-radius: 8px;
            color: white;
            padding: 15px;
            pointer-events: auto;
            display: none; /* Toggle with F2 */
            box-shadow: 0 0 20px rgba(0, 162, 255, 0.5);
        }

        #admin-panel h2 { margin: 0 0 10px 0; color: var(--admin-blue); font-size: 18px; text-transform: uppercase; }
        
        .admin-stat { font-size: 12px; margin-bottom: 5px; opacity: 0.8; }
        
        input.admin-input {
            width: 100%;
            padding: 8px;
            background: #000;
            border: 1px solid #444;
            color: var(--admin-blue);
            outline: none;
            font-family: monospace;
            margin-top: 10px;
        }

        /* INVENTORY SIDEBAR */
        #inventory {
            position: absolute;
            left: 20px; top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 15px;
            color: white;
            pointer-events: auto;
            max-height: 80vh;
            overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .inv-slot {
            width: 50px; height: 50px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            border-radius: 8px;
            transition: 0.2s;
        }

        /* CROSSHAIR */
        #crosshair {
            position: absolute;
            top: 50%; left: 50%;
            width: 10px; height: 10px;
            border: 2px solid white;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            opacity: 0.5;
        }

        /* NOTIFICATIONS */
        #notif-container {
            position: absolute;
            bottom: 20px; left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .notif {
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            border-bottom: 2px solid var(--admin-blue);
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="crosshair"></div>

        <div id="inventory">
            <h3 style="font-size: 10px; text-align: center; margin-bottom: 10px;">ELEMENTS</h3>
            <div id="inv-list"></div>
        </div>

        <div id="admin-panel">
            <h2>Admin Console</h2>
            <div class="admin-stat">User: <span style="color:yellow">Maier_Admin</span></div>
            <div class="admin-stat">Status: <span style="color:lime">Superuser</span></div>
            <div class="admin-stat">Coordinates: <span id="coords">0, 0, 0</span></div>
            
            <hr style="border:0; border-top:1px solid #333; margin:10px 0;">
            
            <div style="font-size: 11px; opacity: 0.7;">COMMANDS: /give [item], /speed [val], /jump [val], /tp [x y z]</div>
            <input type="text" id="command-line" class="admin-input" placeholder="Enter command...">
        </div>

        <div id="notif-container"></div>
    </div>

<script>
/**
 * AETHERIUS 3D ENGINE
 * High-performance 3D Sandbox Game
 */

// 1. GAME CONSTANTS & DATA
const ELEMENTS = [
    { id: 'water', name: 'Water', emoji: '💧', color: 0x00a2ff },
    { id: 'fire', name: 'Fire', emoji: '🔥', color: 0xff4500 },
    { id: 'earth', name: 'Earth', emoji: '🌍', color: 0x8b4513 },
    { id: 'wind', name: 'Wind', emoji: '🌬️', color: 0xffffff },
    { id: 'metal', name: 'Metal', emoji: '⚙️', color: 0xaaaaaa }
];

// 2. CORE VARIABLES
let scene, camera, renderer, clock;
let player, playerVelocity = new THREE.Vector3();
let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false, canJump = false;
let spawnedItems = [];
let inventory = [];

// 3. INITIALIZATION
function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ceeb); // Sky Blue
    scene.fog = new THREE.Fog(0x87ceeb, 0, 100);

    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    clock = new THREE.Clock();

    // Lights
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);

    const sun = new THREE.DirectionalLight(0xffffff, 1);
    sun.position.set(10, 20, 10);
    sun.castShadow = true;
    scene.add(sun);

    // Floor (The Baseplate)
    const floorGeo = new THREE.PlaneGeometry(200, 200);
    const floorMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    scene.add(floor);

    // Grid Helper (Roblox style)
    const grid = new THREE.GridHelper(200, 50, 0x00a2ff, 0x444444);
    scene.add(grid);

    // Player Character
    const playerGeo = new THREE.BoxGeometry(1, 2, 1);
    const playerMat = new THREE.MeshStandardMaterial({ color: 0x00a2ff });
    player = new THREE.Mesh(playerGeo, playerMat);
    player.position.y = 1;
    player.castShadow = true;
    scene.add(player);

    // Initial Spawning of items
    for(let i=0; i<15; i++) {
        spawnRandomElement();
    }

    setupControls();
    animate();
}

// 4. INPUT HANDLING
function setupControls() {
    document.addEventListener('keydown', (e) => {
        switch (e.code) {
            case 'KeyW': moveForward = true; break;
            case 'KeyA': moveLeft = true; break;
            case 'KeyS': moveBackward = true; break;
            case 'KeyD': moveRight = true; break;
            case 'Space': if (canJump) playerVelocity.y += 10; canJump = false; break;
            case 'F2': toggleAdmin(); break;
        }
    });

    document.addEventListener('keyup', (e) => {
        switch (e.code) {
            case 'KeyW': moveForward = false; break;
            case 'KeyA': moveLeft = false; break;
            case 'KeyS': moveBackward = false; break;
            case 'KeyD': moveRight = false; break;
        }
    });

    // Admin Command Processing
    const cmdInput = document.getElementById('command-line');
    cmdInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            processCommand(cmdInput.value);
            cmdInput.value = '';
        }
    });
}

function toggleAdmin() {
    const panel = document.getElementById('admin-panel');
    panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
    if(panel.style.display === 'block') document.getElementById('command-line').focus();
}

// 5. GAME LOGIC
function spawnRandomElement() {
    const type = ELEMENTS[Math.floor(Math.random() * ELEMENTS.length)];
    const geo = new THREE.SphereGeometry(0.5, 16, 16);
    const mat = new THREE.MeshStandardMaterial({ color: type.color, emissive: type.color, emissiveIntensity: 0.5 });
    const mesh = new THREE.Mesh(geo, mat);
    
    mesh.position.set(
        (Math.random() - 0.5) * 40,
        0.5,
        (Math.random() - 0.5) * 40
    );
    
    mesh.userData = type;
    scene.add(mesh);
    spawnedItems.push(mesh);
}

function processCommand(cmd) {
    const parts = cmd.split(' ');
    const action = parts[0];

    switch(action) {
        case '/speed':
            playerSpeedMultiplier = parseFloat(parts[1]) || 1;
            notify(`Admin: Speed set to ${parts[1]}`);
            break;
        case '/tp':
            player.position.set(parseFloat(parts[1]), parseFloat(parts[2]), parseFloat(parts[3]));
            notify("Admin: Teleported player.");
            break;
        case '/give':
            const itemName = parts[1];
            addToInventory({ name: itemName, emoji: '📦' });
            notify(`Admin: Gave 1x ${itemName}`);
            break;
        default:
            notify("Unknown Command", "red");
    }
}

function notify(text) {
    const container = document.getElementById('notif-container');
    const div = document.createElement('div');
    div.className = 'notif';
    div.innerText = text;
    container.appendChild(div);
    setTimeout(() => div.remove(), 3000);
}

function addToInventory(item) {
    inventory.push(item);
    const list = document.getElementById('inv-list');
    const slot = document.createElement('div');
    slot.className = 'inv-slot';
    slot.innerHTML = item.emoji || '💎';
    slot.title = item.name;
    list.appendChild(slot);
}

// 6. ANIMATION LOOP
let playerSpeedMultiplier = 1;

function animate() {
    requestAnimationFrame(animate);
    const delta = clock.getDelta();

    // Basic Movement Physics
    const speed = 15 * playerSpeedMultiplier;
    const friction = 10;

    if (moveForward) playerVelocity.z -= speed * delta;
    if (moveBackward) playerVelocity.z += speed * delta;
    if (moveLeft) playerVelocity.x -= speed * delta;
    if (moveRight) playerVelocity.x += speed * delta;

    playerVelocity.x -= playerVelocity.x * friction * delta;
    playerVelocity.z -= playerVelocity.z * friction * delta;
    
    // Gravity
    playerVelocity.y -= 30 * delta; 

    player.position.add(playerVelocity.clone().multiplyScalar(delta));

    // Floor Collision
    if (player.position.y < 1) {
        playerVelocity.y = 0;
        player.position.y = 1;
        canJump = true;
    }

    // Camera Follow (Third Person)
    const cameraOffset = new THREE.Vector3(0, 5, 10);
    camera.position.lerp(player.position.clone().add(cameraOffset), 0.1);
    camera.lookAt(player.position);

    // Collection Detection
    spawnedItems.forEach((item, index) => {
        // Simple distance check
        if (player.position.distanceTo(item.position) < 1.5) {
            addToInventory(item.userData);
            notify(`Collected: ${item.userData.name}`);
            scene.remove(item);
            spawnedItems.splice(index, 1);
            
            // Respawn a new one somewhere else
            setTimeout(spawnRandomElement, 2000);
        }
        // Make items float/rotate
        item.rotation.y += 0.02;
        item.position.y = 0.5 + Math.sin(Date.now() * 0.002) * 0.2;
    });

    // Update UI
    document.getElementById('coords').innerText = 
        `${Math.round(player.position.x)}, ${Math.round(player.position.y)}, ${Math.round(player.position.z)}`;

    renderer.render(scene, camera);
}

// Window Resize Handling
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// START
init();

</script>
</body>
</html>
